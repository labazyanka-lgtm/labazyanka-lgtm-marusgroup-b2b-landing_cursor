name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run test

      - run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - run: npm run test:e2e
        env:
          CI: true
